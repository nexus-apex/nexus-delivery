{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} DeliveryRoute | NexusDelivery{% endblock %}
{% block page_title %}{% if editing %}Edit DeliveryRoute{% else %}New DeliveryRoute{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Driver Name</label>
        <input type="text" name="driver_name" value="{{ record.driver_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stops</label>
        <input type="number" name="stops" value="{{ record.stops|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Total Distance Km</label>
        <input type="number" step="0.01" name="total_distance_km" value="{{ record.total_distance_km|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Estimated Time Mins</label>
        <input type="number" name="estimated_time_mins" value="{{ record.estimated_time_mins|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="planned" {% if record.status == 'planned' %}selected{% endif %}>Planned</option>
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} DeliveryRoute</button>
      <a href="/deliveryroutes/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
